name: QA

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  qa:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get install -y libimage-exiftool-perl libchromaprint-dev

      - name: Install project
        run: make install

      - name: Lint
        run: make check

      - name: Type check
        run: make typecheck

      - name: Tests
        run: make test
